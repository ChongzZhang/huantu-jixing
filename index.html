<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>宦途疾行</title>
  <link rel="stylesheet" href="css/style.css?v=20260630e">
</head>
<body>
  <div id="wrap">
    <canvas id="game"></canvas>

    <div id="screen-menu" class="screen overlay-ui">
      <div class="panel menu-panel">
        <h1>宦途疾行</h1>
        <p class="sub">庆历进士 · 三格官道 · 四线升迁</p>
        <label>姓名 <input type="text" id="player-name" value="沈砚青" maxlength="8"></label>
        <label class="difficulty-label">难度
          <select id="difficulty">
            <option value="easy">平易 · 同僚最慢</option>
            <option value="normal" selected>中庸 · 常速</option>
            <option value="hard">严苛 · 同僚较快</option>
            <option value="hell">地狱 · 宿敌弹劾弹</option>
          </select>
        </label>
        <button type="button" id="btn-start" class="btn-primary">开跑</button>
        <button type="button" id="btn-test-battle" class="btn-secondary btn-test">测试 · 八波逼宫战</button>
        <button type="button" id="btn-test-boss" class="btn-secondary btn-test">测试 · 直抵伪帝</button>
        <button type="button" id="btn-codex" class="btn-secondary">典故图鉴</button>
        <p class="hint hint-test">版本 20260630e · 官200+兵160 · 130援军 · 混战</p>
        <p class="hint hint-test">测试：<code>?test=coronation</code> 八轮官兵混战 · <code>?test=boss</code> 伪帝战</p>
        <p class="hint hint-mouse">鼠标跟随 · 碰触拾取（奏章同） · P 暂停</p>
        <p class="hint hint-touch hidden">触屏跟随移动 · 碰触拾取 · 点右上角暂停</p>
        <p id="load-hint" class="load-hint"></p>
      </div>
    </div>

    <div id="screen-hud" class="screen">
      <button type="button" id="btn-pause" class="btn-pause" title="暂停 (P)">暂停</button>
    </div>

    <div id="screen-tutorial" class="screen overlay-ui tutorial-screen hidden">
      <div class="panel tutorial-panel">
        <button type="button" id="tutorial-skip" class="tutorial-skip">跳过</button>
        <p id="tutorial-progress" class="tutorial-progress">1 / 4</p>
        <div id="tutorial-scene" class="tutorial-scene" aria-hidden="true"></div>
        <h2 id="tutorial-title">移动</h2>
        <p id="tutorial-body" class="tutorial-body"></p>
        <p id="tutorial-continue" class="tutorial-continue">点击继续</p>
      </div>
    </div>

    <div id="screen-pause" class="screen overlay-ui hidden">
      <div class="panel pause-panel">
        <h2>稍憩</h2>
        <p class="sub">摸魁岸，且歇片刻</p>
        <button type="button" id="btn-resume" class="btn-primary">继续宦途</button>
        <button type="button" id="btn-quit" class="btn-secondary">退出对局</button>
      </div>
    </div>

    <div id="screen-end" class="screen overlay-ui hidden">
      <div class="panel end-panel scroll-panel">
        <div class="scroll-rod scroll-rod-top"></div>
        <div class="scroll-viewport" id="scroll-viewport">
          <div class="scroll-track" id="scroll-track"></div>
        </div>
        <div class="scroll-rod scroll-rod-bottom"></div>
        <p id="scroll-hint" class="scroll-hint hidden">← 左右拖动阅卷 · 升官图 →</p>
        <div class="scroll-actions">
          <button type="button" id="btn-retry" class="btn-primary">再赴宦途</button>
          <button type="button" id="btn-codex-end" class="btn-secondary">图鉴</button>
        </div>
      </div>
    </div>
  </div>

  <div id="modal-codex" class="modal hidden">
    <div class="modal-inner">
      <h3>典故图鉴</h3>
      <div id="codex-body"></div>
      <button type="button" class="modal-close btn-secondary">关闭</button>
    </div>
  </div>

  <script src="js/data/game-data.js?v=20260630e"></script>
  <script src="js/data-load.js?v=20260630e"></script>
  <script src="js/lanes.js?v=20260630e"></script>
  <script src="js/pickup-fx.js?v=20260630e"></script>
  <script src="js/input.js?v=20260630e"></script>
  <script src="js/player.js?v=20260630e"></script>
  <script src="js/difficulty.js?v=20260630e"></script>
  <script src="js/impeachment.js?v=20260630e"></script>
  <script src="js/ai-move.js?v=20260630e"></script>
  <script src="js/npcs.js?v=20260630e"></script>
  <script src="js/rivals.js?v=20260630e"></script>
  <script src="js/exit-reasons.js?v=20260630e"></script>
  <script src="js/ranks.js?v=20260630e"></script>
  <script src="js/storage.js?v=20260630e"></script>
  <script src="js/obstacle-events.js?v=20260630e"></script>
  <script src="js/spawner.js?v=20260630e"></script>
  <script src="js/events.js?v=20260630e"></script>
  <script src="js/renderer.js?v=20260630e"></script>
  <script src="js/life-scroll.js?v=20260630e"></script>
  <script src="js/coronation-battle.js?v=20260630e"></script>
  <script src="js/coronation.js?v=20260630e"></script>
  <script src="js/tutorial.js?v=20260630e"></script>
  <script src="js/main.js?v=20260630e"></script>
</body>
</html>
